<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>SPECTRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--w:#FAF8F5;--bg:#E8DDD3;--ro:#C9A9A6;--ch:#3A3A3A;--go:#C5A572;--dp:#1a1a1a;--gl:rgba(255,255,255,0.03)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;min-height:-webkit-fill-available;font-family:'Inter',sans-serif;background:var(--dp);color:var(--w);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
a{color:var(--go);text-decoration:none}

.hub{padding:env(safe-area-inset-top,20px) 20px 20px;text-align:center;max-width:500px;margin:0 auto}
.hub-nav{display:flex;gap:12px;justify-content:center;margin:20px 0 28px}
.hub-link{
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  padding:8px 16px;border:1px solid rgba(197,165,114,0.15);border-radius:20px;
  color:rgba(197,165,114,0.5);cursor:pointer;-webkit-appearance:none;
  background:transparent;font-family:'Inter',sans-serif;transition:all 0.3s;
}
.hub-link.active{border-color:var(--go);color:var(--go);background:rgba(197,165,114,0.08)}

.brand{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:6px;text-transform:uppercase;color:var(--go);padding-top:24px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,7vw,38px);font-weight:300;line-height:1.2;margin:16px 0 8px}
.page-title em{font-style:italic;color:var(--go)}
.page-sub{font-size:13px;color:rgba(250,248,245,0.3);line-height:1.7;max-width:320px;margin:0 auto 24px}

/* SCREEN SYSTEM */
.screen{display:none;padding:0 20px 40px;max-width:500px;margin:0 auto}
.screen.active{display:block}

/* BACK */
.back{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;margin:0 0 20px;
  background:rgba(197,165,114,0.06);border:1px solid rgba(197,165,114,0.1);
  border-radius:10px;color:var(--go);font-size:12px;letter-spacing:1px;
  cursor:pointer;font-family:'Inter',sans-serif;-webkit-appearance:none;
  transition:all 0.3s;
}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:12px}
.card{
  background:var(--gl);border:1px solid rgba(197,165,114,0.08);
  border-radius:14px;padding:20px;cursor:pointer;
  -webkit-appearance:none;transition:all 0.3s;
  display:flex;align-items:center;gap:14px;
  text-align:left;width:100%;font-family:'Inter',sans-serif;
  color:var(--w);position:relative;
}
.card:active{border-color:var(--go);background:rgba(197,165,114,0.04);transform:scale(0.98)}
.card-ic{font-size:24px;width:44px;height:44px;border-radius:12px;background:rgba(197,165,114,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-t{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400}
.card-tag{display:inline-block;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:8px;margin-top:4px;font-weight:500}
.tag-now{background:rgba(197,165,114,0.15);color:var(--go)}
.tag-soon{background:rgba(201,169,166,0.12);color:var(--ro)}
.tag-later{background:rgba(250,248,245,0.06);color:rgba(250,248,245,0.3)}
.tag-fun{background:rgba(181,196,177,0.12);color:#9AB897}
.card-d{font-size:11px;color:rgba(250,248,245,0.3);margin-top:4px;line-height:1.5}
.card-arr{color:rgba(197,165,114,0.2);font-size:18px;flex-shrink:0}

/* DETAIL */
.det-head{text-align:center;padding:0 0 24px}
.det-ic{font-size:36px;margin-bottom:10px}
.det-t{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,6vw,30px);font-weight:300;line-height:1.2}
.det-sub{font-size:12px;color:rgba(250,248,245,0.35);margin-top:8px;line-height:1.6}
.det-sec{margin-bottom:20px}
.det-sec-t{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--go);margin-bottom:10px;font-weight:500}
.det-items{display:flex;flex-direction:column;gap:6px}
.det-item{display:flex;align-items:flex-start;gap:10px;background:var(--gl);border:1px solid rgba(197,165,114,0.05);border-radius:8px;padding:12px 14px}
.det-dot{width:5px;height:5px;border-radius:50%;background:var(--go);flex-shrink:0;margin-top:6px}
.det-txt{font-size:12px;color:rgba(250,248,245,0.45);line-height:1.5;flex:1}
.det-cta{
  display:block;width:100%;padding:16px;margin-top:20px;
  background:linear-gradient(135deg,var(--go),var(--ro));
  border:none;border-radius:12px;
  font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;
  color:var(--dp);cursor:pointer;text-align:center;letter-spacing:1px;
  -webkit-appearance:none;transition:all 0.3s;
}
.det-cta:active{opacity:0.85;transform:scale(0.98)}

/* RESULT */
.res-emoji{font-size:44px;text-align:center;margin-bottom:12px}
.res-t{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,6vw,30px);font-weight:300;text-align:center;line-height:1.2;margin-bottom:10px}
.res-txt{font-size:12px;color:rgba(250,248,245,0.35);text-align:center;line-height:1.7;max-width:320px;margin:0 auto 20px}
.res-box{background:var(--gl);border:1px solid rgba(197,165,114,0.08);border-radius:12px;padding:16px;margin-bottom:12px}
.res-box-t{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--go);margin-bottom:8px}
.res-box-i{font-size:12px;color:rgba(250,248,245,0.4);padding:3px 0;line-height:1.5}
.res-note{font-size:11px;color:rgba(250,248,245,0.2);text-align:center;margin-top:16px;line-height:1.6;font-style:italic}
.res-back{
  display:block;width:100%;padding:14px;margin-top:16px;
  background:rgba(197,165,114,0.08);border:1px solid rgba(197,165,114,0.15);
  border-radius:12px;color:var(--go);font-size:14px;text-align:center;
  cursor:pointer;font-family:'Inter',sans-serif;-webkit-appearance:none;
  transition:all 0.3s;
}

/* ---- PRESENTATION STYLES ---- */
.pres{padding:0 20px 40px;max-width:500px;margin:0 auto}
.pres-slide{
  display:none;min-height:70vh;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px 0;
}
.pres-slide.active{display:flex}
.pres-nav{
  display:flex;gap:12px;justify-content:center;
  padding:20px;position:sticky;bottom:0;
  background:linear-gradient(to top,var(--dp) 60%,transparent);
}
.pres-btn{
  padding:12px 28px;border-radius:10px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;-webkit-appearance:none;
  transition:all 0.3s;border:none;
}
.pres-btn.prev{background:rgba(197,165,114,0.08);color:var(--go);border:1px solid rgba(197,165,114,0.15)}
.pres-btn.next{background:linear-gradient(135deg,var(--go),var(--ro));color:var(--dp)}
.pres-btn:active{transform:scale(0.95)}
.pres-counter{font-size:10px;color:rgba(197,165,114,0.3);letter-spacing:2px;padding:8px 0 0;text-align:center}

/* Pres elements */
.p-brand{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,14vw,80px);font-weight:300;letter-spacing:clamp(4px,2vw,12px);background:linear-gradient(135deg,var(--w),var(--bg) 40%,var(--go));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.p-line{width:40px;height:1px;background:var(--go);margin:20px auto}
.p-sub{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:rgba(250,248,245,0.3)}
.p-motto{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,11vw,64px);font-weight:300;font-style:italic;color:var(--go);line-height:1.15}
.p-text{font-size:13px;color:rgba(250,248,245,0.4);line-height:1.8;max-width:320px;margin:0 auto}
.p-ring{width:clamp(150px,40vw,220px);height:clamp(150px,40vw,220px);border-radius:50%;position:relative;margin:0 auto 24px}
.p-ring::before{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(from 0deg,var(--go),var(--ro),var(--bg),var(--go));opacity:0.25;-webkit-animation:spin 12s linear infinite;animation:spin 12s linear infinite}
@-webkit-keyframes spin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
.p-ring-in{position:absolute;inset:2px;border-radius:50%;background:var(--dp);display:flex;flex-direction:column;align-items:center;justify-content:center}
.p-ring-n{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,8vw,48px);font-weight:300;color:var(--go);line-height:1}
.p-ring-l{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(250,248,245,0.3);margin-top:4px}
.p-label{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--go);margin-bottom:14px}
.p-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,6vw,36px);font-weight:300;line-height:1.2;margin-bottom:12px}
.p-title em{font-style:italic;color:var(--go)}
.p-feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:300px;margin:16px auto 0;text-align:left}
.p-feat{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(250,248,245,0.4)}
.p-feat-dot{width:4px;height:4px;border-radius:50%;background:var(--go);flex-shrink:0}
.p-stats{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:100%;max-width:320px;margin:0 auto}
.p-stat{background:rgba(255,255,255,0.03);border:1px solid rgba(197,165,114,0.06);padding:24px 12px;text-align:center}
.p-stat-n{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,7vw,40px);font-weight:300;color:var(--go);line-height:1}
.p-stat-u{font-size:11px;color:var(--ro)}
.p-stat-l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(250,248,245,0.2);margin-top:6px}
.p-svcs{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px;margin:0 auto}
.p-svc{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(197,165,114,0.06);padding:14px 16px;border-radius:2px;text-align:left}
.p-svc-ic{font-size:18px;width:32px;text-align:center;flex-shrink:0}
.p-svc-info{flex:1}
.p-svc-nm{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--w)}
.p-svc-sb{font-size:10px;color:rgba(250,248,245,0.25);margin-top:1px}
.p-svc-pr{font-size:11px;color:var(--go);font-weight:500;flex-shrink:0}
.p-swatches{display:flex;gap:3px;width:100%;max-width:300px;height:60px;margin:16px auto 0}
.p-sw{flex:1;border-radius:2px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
.p-sw span{font-size:7px;letter-spacing:1px;text-transform:uppercase;opacity:0.5}
.p-tl{display:flex;flex-direction:column;gap:0;width:100%;max-width:280px;margin:0 auto;position:relative;text-align:left}
.p-tl::before{content:'';position:absolute;top:0;bottom:0;left:11px;width:1px;background:linear-gradient(to bottom,transparent,var(--go),var(--go),transparent)}
.p-tl-i{display:flex;align-items:flex-start;gap:16px;padding:10px 0}
.p-tl-d{width:8px;height:8px;border-radius:50%;border:2px solid var(--go);background:var(--dp);flex-shrink:0;margin-top:3px;z-index:1}
.p-tl-i.on .p-tl-d{background:var(--go)}
.p-tl-m{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--go);font-weight:500}
.p-tl-t{font-size:11px;color:rgba(250,248,245,0.3);margin-top:2px}
.p-steps{display:flex;flex-direction:column;gap:16px;width:100%;max-width:280px;margin:16px auto 0;text-align:left}
.p-step{display:flex;align-items:flex-start;gap:12px}
.p-step-n{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--go);min-width:28px}
.p-step-t{font-size:12px;color:rgba(250,248,245,0.4);line-height:1.5;padding-top:4px}
.p-final{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,8vw,44px);font-weight:300;line-height:1.25}
.p-final em{font-style:italic;color:var(--go)}
.p-heart{font-size:24px;margin-top:20px}

@media(min-width:768px){.hub,.screen,.pres{max-width:600px}.p-stats{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

// ===== BUILD FUNCTIONS =====
function ce(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;return e}

function buildNavCards(){
  var c=document.getElementById('navCards');
  while(c.firstChild)c.removeChild(c.firstChild);
  ITEMS.forEach(function(item){
    var card=ce('button','card');
    var ic=ce('div','card-ic',item.ic);
    var body=ce('div','card-body');
    body.appendChild(ce('div','card-t',item.t));
    var tag=ce('div','card-tag tag-'+item.tg,item.tgT);
    body.appendChild(tag);
    body.appendChild(ce('div','card-d',item.d));
    card.appendChild(ic);
    card.appendChild(body);
    card.appendChild(ce('div','card-arr','\u203A'));
    card.addEventListener('click',function(){showDetail(item)});
    c.appendChild(card);
  });
}

function showDetail(item){
  hideAll();
  var p=document.getElementById('page-detail');
  while(p.firstChild)p.removeChild(p.firstChild);

  var back=ce('button','back','\u2190 Zur\u00FCck');
  back.addEventListener('click',function(){showPage('navigator')});
  p.appendChild(back);

  var h=ce('div','det-head');
  h.appendChild(ce('div','det-ic',item.ic));
  h.appendChild(ce('div','det-t',item.t));
  h.appendChild(ce('div','det-sub',item.det.sub));
  p.appendChild(h);

  item.det.sec.forEach(function(sec){
    var s=ce('div','det-sec');
    s.appendChild(ce('div','det-sec-t',sec.t));
    var items=ce('div','det-items');
    sec.i.forEach(function(txt){
      var di=ce('div','det-item');
      di.appendChild(ce('div','det-dot'));
      di.appendChild(ce('div','det-txt',txt));
      items.appendChild(di);
    });
    s.appendChild(items);
    p.appendChild(s);
  });

  var cta=ce('button','det-cta','Das will ich als N\u00E4chstes machen');
  cta.addEventListener('click',function(){showResult(item)});
  p.appendChild(cta);
  p.className='screen active';
  window.scrollTo(0,0);
}

function showResult(item){
  hideAll();
  var p=document.getElementById('page-result');
  while(p.firstChild)p.removeChild(p.firstChild);

  var back=ce('button','back','\u2190 Zur\u00FCck');
  back.addEventListener('click',function(){showDetail(item)});
  p.appendChild(back);

  p.appendChild(ce('div','res-emoji',item.res.em));
  p.appendChild(ce('div','res-t',item.res.t));
  p.appendChild(ce('div','res-txt',item.res.tx));

  item.res.b.forEach(function(box){
    var b=ce('div','res-box');
    b.appendChild(ce('div','res-box-t',box.t));
    box.i.forEach(function(it){b.appendChild(ce('div','res-box-i','\u2022 '+it))});
    p.appendChild(b);
  });

  p.appendChild(ce('div','res-note',item.res.n));

  var rb=ce('button','res-back','\u2190 Andere Bereiche anschauen');
  rb.addEventListener('click',function(){showPage('navigator')});
  p.appendChild(rb);

  p.className='screen active';
  window.scrollTo(0,0);
}

function presGo(dir){
  var next=presIdx+dir;
  if(next<0||next>=PSLIDES.length)return;
  document.getElementById('pslide-'+presIdx).className='pres-slide';
  presIdx=next;
  document.getElementById('pslide-'+presIdx).className='pres-slide active';
  updatePresCounter();
  document.getElementById('presPrev').style.visibility=presIdx===0?'hidden':'visible';
  document.getElementById('presNext').textContent=presIdx===PSLIDES.length-1?'\u2190 Start':'Weiter \u2192';
  if(presIdx===PSLIDES.length-1){
    document.getElementById('presNext').addEventListener('click',function once(){presIdx=PSLIDES.length-1;presGo(-(PSLIDES.length-1));document.getElementById('presNext').removeEventListener('click',once)},{once:true});
  }
}
function updatePresCounter(){document.getElementById('presCounter').textContent=(presIdx+1)+' / '+PSLIDES.length}

// ===== PAGE SWITCHING =====
function hideAll(){
  ['page-navigator','page-detail','page-result','page-presentation'].forEach(function(id){
    document.getElementById(id).className='screen';
  });
}
function showPage(page){
  hideAll();
  if(page==='navigator'){
    document.getElementById('page-navigator').className='screen active';
    document.getElementById('navBtn1').className='hub-link active';
    document.getElementById('navBtn2').className='hub-link';
    document.getElementById('presNav').style.display='none';
    document.getElementById('presCounter').style.display='none';
  }else if(page==='presentation'){
    document.getElementById('page-presentation').className='screen active';
    document.getElementById('navBtn2').className='hub-link active';
    document.getElementById('navBtn1').className='hub-link';
    document.getElementById('presNav').style.display='flex';
    document.getElementById('presCounter').style.display='block';
    presIdx=0;
    document.querySelectorAll('.pres-slide').forEach(function(s,i){s.className='pres-slide'+(i===0?' active':'')});
    updatePresCounter();
    document.getElementById('presPrev').style.visibility='hidden';
  }
  window.scrollTo(0,0);
}
